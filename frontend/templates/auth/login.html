{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card fade-in-up">
        <!-- Header -->
        <div class="text-center mb-4">
            <i class="bi bi-camera-fill text-success" style="font-size: 2.5rem;"></i>
            <h1 class="h3 fw-bold mt-2 text-white">Welcome Back</h1>
            <p class="text-secondary small">Sign in to your NutriSnap account</p>
        </div>

        <!-- Login Form — fully implemented in Phase 5 -->
        <form method="POST" action="{{ url_for('auth.login') }}" id="login-form" novalidate>
            {# CSRF Token (Flask-WTF) — uncomment in Phase 5 when form objects are passed #}
            {# form.hidden_tag() #}

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email"
                       placeholder="you@example.com" required autocomplete="email">
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Your password" required autocomplete="current-password">
            </div>

            <!-- Remember Me -->
            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember" name="remember">
                    <label class="form-check-label text-secondary small" for="remember">
                        Remember me
                    </label>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-success w-100 py-2" id="login-submit-btn">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <hr class="border-secondary my-4">

        <p class="text-center text-secondary small mb-0">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" class="text-success fw-semibold"
               id="go-to-register-link">
                Create one free
            </a>
        </p>
    </div>
</section>
{% endblock %}
