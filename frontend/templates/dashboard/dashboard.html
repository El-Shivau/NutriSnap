{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="container py-4 fade-in-up">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 fw-bold mb-0 text-white">Dashboard</h1>
            <p class="text-secondary small mb-0">Your nutritional summary for today</p>
        </div>
        <a href="{{ url_for('food.upload') }}" class="btn btn-success" id="dashboard-upload-btn">
            <i class="bi bi-plus-circle me-2"></i>Log Food
        </a>
    </div>

    <!-- Today's Summary Stat Cards — populated in Phase 6 -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="stat-card text-center">
                <div class="stat-value" id="stat-calories">—</div>
                <div class="stat-label">Calories</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card text-center">
                <div class="stat-value" id="stat-protein">—</div>
                <div class="stat-label">Protein (g)</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card text-center">
                <div class="stat-value" id="stat-carbs">—</div>
                <div class="stat-label">Carbs (g)</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card text-center">
                <div class="stat-value" id="stat-fat">—</div>
                <div class="stat-label">Fat (g)</div>
            </div>
        </div>
    </div>

    <!-- Recent Logs — populated in Phase 6 -->
    <div class="food-log-table">
        <div class="p-3 border-bottom" style="border-color: var(--ns-border);">
            <h2 class="h6 fw-semibold text-white mb-0">
                <i class="bi bi-clock-history me-2 text-success"></i>Recent Logs
            </h2>
        </div>
        <div class="p-4 text-center text-secondary" id="recent-logs-placeholder">
            <i class="bi bi-journal-x" style="font-size: 2rem; opacity: 0.4;"></i>
            <p class="mt-2 mb-0 small">No food logged today. <a href="{{ url_for('food.upload') }}">Upload your first meal!</a></p>
        </div>
    </div>
</div>
{% endblock %}
