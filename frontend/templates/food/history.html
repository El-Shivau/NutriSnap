{% extends "base.html" %}

{% block title %}My Food History{% endblock %}

{% block content %}
<div class="container py-4 fade-in-up">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold text-white mb-0">
            <i class="bi bi-clock-history text-success me-2"></i>Food History
        </h1>
        <a href="{{ url_for('food.upload') }}" class="btn btn-success btn-sm"
           id="history-upload-btn">
            <i class="bi bi-plus me-1"></i>Log More
        </a>
    </div>

    <!-- History Table — populated in Phase 6/7 -->
    <div class="food-log-table">
        <table class="table mb-0" id="history-table">
            <thead>
                <tr>
                    <th>Food</th>
                    <th>Calories</th>
                    <th>Protein</th>
                    <th>Carbs</th>
                    <th>Fat</th>
                    <th>Confidence</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="history-table-body">
                <tr>
                    <td colspan="7" class="text-center text-secondary py-5">
                        <i class="bi bi-journal-x" style="font-size: 2rem; opacity: 0.4;"></i>
                        <p class="mt-2 mb-0 small">No history yet. <a href="{{ url_for('food.upload') }}">Upload your first meal!</a></p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
