{% extends "base.html" %}

{% block title %}My Profile{% endblock %}

{% block content %}
<div class="container py-4 fade-in-up" style="max-width: 640px;">
    <h1 class="h3 fw-bold text-white mb-1">
        <i class="bi bi-person-circle text-success me-2"></i>My Profile
    </h1>
    <p class="text-secondary small mb-4">Manage your account information</p>

    <div class="prediction-card">
        <form method="POST" action="{{ url_for('dashboard.profile') }}" id="profile-form">

            <!-- Username -->
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Your username"
                       value="{{ current_user.username }}"
                       minlength="3" maxlength="80" required>
                <div class="form-text text-secondary" style="font-size:0.75rem;">
                    Minimum 3 characters, maximum 80.
                </div>
            </div>

            <!-- Email (read-only) -->
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email"
                       value="{{ current_user.email }}" readonly
                       style="cursor: not-allowed; opacity: 0.7;">
                <div class="form-text text-secondary" style="font-size: 0.75rem;">
                    Email cannot be changed.
                </div>
            </div>

            <!-- Member since -->
            <div class="mb-3">
                <label class="form-label">Member Since</label>
                <input type="text" class="form-control" readonly
                       value="{{ current_user.created_at.strftime('%B %d, %Y') if current_user.created_at else '—' }}"
                       style="cursor: not-allowed; opacity: 0.7;">
            </div>

            <!-- Bio -->
            <div class="mb-4">
                <label for="bio" class="form-label">Bio <span class="text-secondary small">(optional)</span></label>
                <textarea class="form-control" id="bio" name="bio" rows="3"
                          placeholder="Tell us about yourself...">{{ current_user.bio or '' }}</textarea>
            </div>

            <button type="submit" class="btn btn-success" id="save-profile-btn">
                <i class="bi bi-floppy me-2"></i>Save Changes
            </button>
            <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-outline-secondary ms-2">
                Cancel
            </a>
        </form>
    </div>

    <!-- Account stats -->
    <div class="row g-3 mt-3">
        <div class="col-12">
            <div class="stat-card p-3">
                <h2 class="h6 fw-semibold text-white mb-3">
                    <i class="bi bi-bar-chart text-success me-2"></i>Account Stats
                </h2>
                <div class="row g-2 text-center">
                    <div class="col-4">
                        <div class="fw-bold text-success fs-5" id="profile-total-logs">—</div>
                        <div class="text-secondary" style="font-size:0.75rem;">Total Logs</div>
                    </div>
                    <div class="col-4">
                        <a href="{{ url_for('food.history') }}" class="text-decoration-none">
                            <div class="fw-bold text-success fs-5">
                                <i class="bi bi-arrow-right-circle"></i>
                            </div>
                            <div class="text-secondary" style="font-size:0.75rem;">View History</div>
                        </a>
                    </div>
                    <div class="col-4">
                        <a href="{{ url_for('food.upload') }}" class="text-decoration-none">
                            <div class="fw-bold text-success fs-5">
                                <i class="bi bi-plus-circle"></i>
                            </div>
                            <div class="text-secondary" style="font-size:0.75rem;">Log Food</div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
