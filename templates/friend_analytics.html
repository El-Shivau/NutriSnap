{% extends "layout.html" %}

{% block content %}
<div class="app-container">
    <div class="page-header fade-up">
        <a href="/friends" style="color: var(--text-muted); font-size: 0.9rem;">
            <i class="fas fa-arrow-left"></i> Back
        </a>
        <span class="logo-text">NutriSnap</span>
    </div>

    <div id="analytics-content">
        <div class="glass-card text-center" style="padding: 40px;">
            <div class="spinner"></div>
            <p class="text-muted mt-2" style="font-size: 0.85rem;">Loading analytics...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        // Extract friend ID from URL
        const pathParts = window.location.pathname.split('/');
        const friendId = pathParts[pathParts.length - 1];

        try {
            const data = await fetchAuth(`/api/friends/${friendId}/analytics`);
            const container = document.getElementById('analytics-content');

            if (!data || data.error) {
                container.innerHTML = `
                    <div class="glass-card text-center" style="padding: 40px;">
                        <p class="text-muted">${data?.error || 'Cannot load analytics.'}</p>
                    </div>`;
                return;
            }

            container.innerHTML = `
                <!-- Friend Name -->
                <h2 class="fade-up" style="margin-bottom: 20px;">
                    <i class="fas fa-user" style="color: var(--primary);"></i> ${data.username}
                </h2>

                <!-- Weekly Totals -->
                <div class="stat-grid fade-up fade-up-delay-1">
                    <div class="glass-card stat-card">
                        <div class="stat-label">Weekly Calories</div>
                        <div class="stat-value" style="color: var(--primary);">${Math.round(data.weekly.calories)}</div>
                        <div class="stat-label">kcal</div>
                    </div>
                    <div class="glass-card stat-card">
                        <div class="stat-label">Weekly Protein</div>
                        <div class="stat-value" style="color: var(--blue);">${Math.round(data.weekly.protein)}</div>
                        <div class="stat-label">grams</div>
                    </div>
                </div>

                <!-- Monthly Summary -->
                <div class="stat-grid fade-up fade-up-delay-2" style="margin-top: 4px;">
                    <div class="glass-card stat-card">
                        <div class="stat-label">Monthly Calories</div>
                        <div class="stat-value" style="font-size: 1.5rem; color: var(--amber);">${Math.round(data.monthly.calories)}</div>
                        <div class="stat-label">kcal</div>
                    </div>
                    <div class="glass-card stat-card">
                        <div class="stat-label">Monthly Protein</div>
                        <div class="stat-value" style="font-size: 1.5rem; color: var(--blue);">${Math.round(data.monthly.protein)}</div>
                        <div class="stat-label">grams</div>
                    </div>
                </div>

                <!-- Weekly Chart -->
                <div class="glass-card chart-section fade-up fade-up-delay-3" style="margin-top: 16px;">
                    <h3>Weekly Breakdown</h3>
                    <canvas id="friendChart"></canvas>
                </div>

                <!-- Recent Meals -->
                <div class="fade-up fade-up-delay-4" style="margin-top: 20px;">
                    <h3 class="section-title">Recent Meals</h3>
                    <div id="meals-list"></div>
                </div>
            `;

            // Chart
            if (data.weekly.daily && data.weekly.daily.length > 0) {
                const ctx = document.getElementById('friendChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.weekly.daily.map(d => d.date),
                        datasets: [{
                            label: 'Calories',
                            data: data.weekly.daily.map(d => d.calories),
                            backgroundColor: 'rgba(34, 197, 94, 0.6)',
                            borderRadius: 6
                        }, {
                            label: 'Protein (g)',
                            data: data.weekly.daily.map(d => d.protein),
                            backgroundColor: 'rgba(59, 130, 246, 0.6)',
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { labels: { color: '#888', font: { size: 11 } } } },
                        scales: {
                            y: { ticks: { color: '#555' }, grid: { color: 'rgba(255,255,255,0.04)' } },
                            x: { ticks: { color: '#555' }, grid: { color: 'rgba(255,255,255,0.04)' } }
                        }
                    }
                });
            }

            // Meals List
            const mealsList = document.getElementById('meals-list');
            if (data.recent_meals.length === 0) {
                mealsList.innerHTML = '<div class="glass-card text-center" style="padding: 20px;"><p class="text-muted">No meals logged.</p></div>';
            } else {
                data.recent_meals.forEach(meal => {
                    const item = document.createElement('div');
                    item.className = 'glass-card log-item';
                    item.innerHTML = `
                        <img src="${meal.image_url || ''}" class="log-img" onerror="this.style.display='none'">
                        <div class="log-info">
                            <div class="log-name">${meal.food_name}</div>
                            <div class="log-time">${meal.created_at}</div>
                        </div>
                        <div class="log-cals">${Math.round(meal.calories)} kcal</div>
                    `;
                    mealsList.appendChild(item);
                });
            }

        } catch (e) {
            console.error('Error loading analytics', e);
            document.getElementById('analytics-content').innerHTML =
                '<div class="glass-card text-center" style="padding: 30px;"><p class="text-muted">Failed to load friend analytics.</p></div>';
        }
    });
</script>
{% endblock %}
