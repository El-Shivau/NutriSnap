{% extends "layout.html" %}

{% block content %}
<div class="app-container">
    <div class="page-header fade-up">
        <h1>Friends</h1>
        <span class="logo-text">NutriSnap</span>
    </div>

    <!-- Add Friend -->
    <div class="glass-card fade-up fade-up-delay-1" style="margin-bottom: 20px;">
        <h3 class="section-title" style="margin-bottom: 14px;">Add Friend</h3>
        <form id="addFriendForm" style="display: flex; gap: 10px; position: relative;">
            <div style="flex: 1; position: relative;">
                <input type="text" id="friendUsername" class="form-control" placeholder="Type a username..." autocomplete="off" style="width: 100%;">
                <ul id="username-suggestions" style="
                    display: none;
                    position: absolute;
                    top: 100%;
                    left: 0;
                    right: 0;
                    z-index: 999;
                    background: linear-gradient(160deg, rgba(30,30,34,0.95), rgba(18,18,22,0.95));
                    border: 1px solid rgba(255,255,255,0.16);
                    border-radius: 12px;
                    margin: 6px 0 0;
                    padding: 6px;
                    list-style: none;
                    backdrop-filter: blur(8px);
                    box-shadow: 0 12px 28px rgba(0,0,0,0.45);
                    max-height: 220px;
                    overflow-y: auto;
                "></ul>
            </div>
            <button type="submit" class="btn btn-primary" style="white-space: nowrap;">
                <i class="fas fa-user-plus"></i> Send Request
            </button>
        </form>
        <div id="add-status" class="d-none" style="margin-top: 10px; font-size: 0.85rem;"></div>
    </div>

    <!-- Friend Requests -->
    <h3 class="section-title fade-up fade-up-delay-2">Friend Requests</h3>
    <div id="requests-list" style="margin-bottom: 20px;">
        <div class="glass-card text-center" style="padding: 20px;">
            <div class="spinner"></div>
            <p class="text-muted mt-2" style="font-size: 0.85rem;">Loading requests...</p>
        </div>
    </div>

    <!-- Friends List -->
    <h3 class="section-title fade-up fade-up-delay-3">My Friends</h3>
    <div id="friends-list">
        <div class="glass-card text-center" style="padding: 30px;">
            <div class="spinner"></div>
            <p class="text-muted mt-2" style="font-size: 0.85rem;">Loading friends...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let validatedUsername = null;  // tracks last username that was confirmed via suggestion click
    let debounceTimer = null;

    const input = document.getElementById('friendUsername');
    const suggestionsList = document.getElementById('username-suggestions');
    const statusEl = document.getElementById('add-status');

    // --- Autocomplete ---
    input.addEventListener('input', () => {
        const q = input.value;
        validatedUsername = null;  // reset until user picks from list

        clearTimeout(debounceTimer);
        if (!q) { hideSuggestions(); return; }

        debounceTimer = setTimeout(async () => {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch(`/api/users/search?q=${encodeURIComponent(q)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const names = await res.json();
                renderSuggestions(names);
            } catch (e) {
                hideSuggestions();
            }
        }, 220);
    });

    function renderSuggestions(names) {
        suggestionsList.innerHTML = '';
        if (!names || names.length === 0) { hideSuggestions(); return; }

        names.forEach(name => {
            const li = document.createElement('li');
            li.textContent = name;
            li.style.cssText = 'padding: 10px 12px; cursor: pointer; font-size: 0.9rem; color: var(--text); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; margin-bottom: 6px; background: rgba(255,255,255,0.02);';
            li.addEventListener('mouseenter', () => li.style.background = 'rgba(255,255,255,0.10)');
            li.addEventListener('mouseleave', () => li.style.background = '');
            li.addEventListener('mousedown', (e) => {
                // mousedown fires before blur — prevent losing focus then set value
                e.preventDefault();
                input.value = name;
                validatedUsername = name;  // exact match confirmed by user selection
                hideSuggestions();
            });
            suggestionsList.appendChild(li);
        });
        const last = suggestionsList.lastElementChild;
        if (last) last.style.marginBottom = '0';
        suggestionsList.style.display = 'block';
    }

    function hideSuggestions() { suggestionsList.style.display = 'none'; }

    input.addEventListener('blur', hideSuggestions);
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') hideSuggestions();
    });

    // --- Send friend request ---
    document.getElementById('addFriendForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = input.value.trim();
        if (!username) return;

        // Must have been selected from suggestions list
        if (validatedUsername !== username) {
            statusEl.classList.remove('d-none');
            statusEl.style.color = 'var(--red)';
            statusEl.textContent = '✕ Please select a user from the suggestions list';
            setTimeout(() => statusEl.classList.add('d-none'), 3000);
            return;
        }

        statusEl.classList.remove('d-none');
        statusEl.style.color = 'var(--text-muted)';
        statusEl.textContent = 'Sending...';

        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/friends/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ username })
            });

            const data = await res.json();

            if (res.ok) {
                statusEl.style.color = 'var(--primary)';
                statusEl.textContent = '✓ ' + data.message;
                input.value = '';
                validatedUsername = null;
                loadRequests();
            } else {
                statusEl.style.color = 'var(--red)';
                statusEl.textContent = '✕ ' + (data.error || 'Failed to send request');
            }
        } catch (err) {
            statusEl.style.color = 'var(--red)';
            statusEl.textContent = '✕ An error occurred';
        }

        setTimeout(() => statusEl.classList.add('d-none'), 3000);
    });

    async function acceptRequest(requestId) {
        try {
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/friends/requests/${requestId}/accept`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            const data = await res.json();
            if (!res.ok) {
                alert(data.error || 'Failed to accept request');
                return;
            }

            loadRequests();
            loadFriends();
        } catch (e) {
            console.error('Error accepting request', e);
            alert('Failed to accept request');
        }
    }

    async function removeFriend(friendId, event) {
        event.preventDefault();
        event.stopPropagation();

        const ok = confirm('Remove this user from your friends?');
        if (!ok) return;

        try {
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/friends/${friendId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            const data = await res.json();
            if (!res.ok) {
                alert(data.error || 'Failed to remove friend');
                return;
            }

            loadFriends();
        } catch (e) {
            console.error('Error removing friend', e);
            alert('Failed to remove friend');
        }
    }

    async function loadRequests() {
        try {
            const data = await fetchAuth('/api/friends/requests');
            const container = document.getElementById('requests-list');
            const incoming = (data && data.incoming) ? data.incoming : [];
            const outgoing = (data && data.outgoing) ? data.outgoing : [];

            container.innerHTML = '';

            if (incoming.length === 0 && outgoing.length === 0) {
                container.innerHTML = `
                    <div class="glass-card text-center" style="padding: 20px;">
                        <p class="text-muted">No pending friend requests.</p>
                    </div>`;
                return;
            }

            if (incoming.length > 0) {
                const incomingCard = document.createElement('div');
                incomingCard.className = 'glass-card';
                incomingCard.style.marginBottom = '10px';
                incomingCard.innerHTML = `
                    <div class="section-title" style="font-size: 0.95rem; margin-bottom: 12px;">Incoming</div>
                    <div id="incoming-requests"></div>
                `;
                container.appendChild(incomingCard);

                const incomingWrap = incomingCard.querySelector('#incoming-requests');
                incoming.forEach(req => {
                    const row = document.createElement('div');
                    row.style.display = 'flex';
                    row.style.justifyContent = 'space-between';
                    row.style.alignItems = 'center';
                    row.style.padding = '8px 0';
                    row.style.borderBottom = '1px solid rgba(255,255,255,0.08)';
                    row.innerHTML = `
                        <div>
                            <div style="font-weight: 600; color: var(--text);">${req.from_username}</div>
                            <div class="text-muted" style="font-size: 0.8rem;">Requested ${req.created_at}</div>
                        </div>
                        <button class="btn btn-primary" style="padding: 8px 12px;" onclick="acceptRequest(${req.id})">
                            Accept
                        </button>
                    `;
                    incomingWrap.appendChild(row);
                });
            }

            if (outgoing.length > 0) {
                const outgoingCard = document.createElement('div');
                outgoingCard.className = 'glass-card';
                outgoingCard.innerHTML = `
                    <div class="section-title" style="font-size: 0.95rem; margin-bottom: 12px;">Sent</div>
                    <div id="outgoing-requests"></div>
                `;
                container.appendChild(outgoingCard);

                const outgoingWrap = outgoingCard.querySelector('#outgoing-requests');
                outgoing.forEach(req => {
                    const row = document.createElement('div');
                    row.style.display = 'flex';
                    row.style.justifyContent = 'space-between';
                    row.style.alignItems = 'center';
                    row.style.padding = '8px 0';
                    row.style.borderBottom = '1px solid rgba(255,255,255,0.08)';
                    row.innerHTML = `
                        <div>
                            <div style="font-weight: 600; color: var(--text);">${req.to_username}</div>
                            <div class="text-muted" style="font-size: 0.8rem;">Sent ${req.created_at}</div>
                        </div>
                        <div class="text-muted" style="font-size: 0.8rem;">Pending</div>
                    `;
                    outgoingWrap.appendChild(row);
                });
            }
        } catch (e) {
            console.error('Error loading requests', e);
            document.getElementById('requests-list').innerHTML =
                '<div class="glass-card text-center" style="padding: 20px;"><p class="text-muted">Failed to load friend requests.</p></div>';
        }
    }

    // Load friends list
    async function loadFriends() {
        try {
            const friends = await fetchAuth('/api/friends');
            const list = document.getElementById('friends-list');
            list.innerHTML = '';

            if (!friends || friends.length === 0) {
                list.innerHTML = `
                    <div class="glass-card text-center" style="padding: 40px;">
                        <div style="font-size: 2rem; margin-bottom: 12px;">👥</div>
                        <p class="text-muted">No friends yet. Add a friend by username above!</p>
                    </div>`;
                return;
            }

            friends.forEach((friend, i) => {
                const card = document.createElement('a');
                card.href = `/friends/${friend.id}`;
                card.className = 'glass-card lb-card fade-up';
                card.style.animationDelay = `${i * 0.06}s`;
                card.style.opacity = '0';
                card.style.textDecoration = 'none';
                card.style.cursor = 'pointer';
                card.innerHTML = `
                    <div class="lb-rank" style="background: var(--primary); color: #000; border: none;">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="lb-info">
                        <div class="lb-username">${friend.username}</div>
                        <div class="lb-details">Friends since ${friend.since}</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button class="btn" onclick="removeFriend(${friend.id}, event)" style="
                            padding: 6px 10px;
                            font-size: 0.78rem;
                            border: 1px solid rgba(255,84,84,0.45);
                            color: var(--red);
                            background: rgba(255,84,84,0.10);
                        ">Remove</button>
                        <div style="color: var(--text-muted);">
                            <i class="fas fa-chart-bar"></i>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        } catch (e) {
            console.error('Error loading friends', e);
            document.getElementById('friends-list').innerHTML =
                '<div class="glass-card text-center" style="padding: 30px;"><p class="text-muted">Failed to load friends.</p></div>';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadRequests();
        loadFriends();
    });
</script>
{% endblock %}
