{% extends "layout.html" %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card fade-up">
        <h2 class="auth-title">Login to <span class="text-primary">NutriSnap</span></h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-full">Login</button>
            <p class="text-center mt-4" style="font-size: 0.9rem;">
                Don't have an account? <a href="/register" class="text-primary" style="font-weight: 600;">Register</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            if (res.ok) {
                localStorage.setItem('token', result.token);
                localStorage.setItem('username', result.username);
                window.location.href = '/dashboard';
            } else {
                alert(result.error || 'Login failed');
            }
        } catch (err) {
            alert('An error occurred');
        }
    });
</script>
{% endblock %}
