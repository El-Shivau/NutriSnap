{% extends "layout.html" %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card fade-up">
        <h2 class="auth-title">Join <span class="text-primary">NutriSnap</span></h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-full">Create Account</button>
            <p class="text-center mt-4" style="font-size: 0.9rem;">
                Already have an account? <a href="/login" class="text-primary" style="font-weight: 600;">Login</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            if (res.ok) {
                alert('Registration successful! Please login.');
                window.location.href = '/login';
            } else {
                alert(result.error || 'Registration failed');
            }
        } catch (err) {
            alert('An error occurred');
        }
    });
</script>
{% endblock %}
